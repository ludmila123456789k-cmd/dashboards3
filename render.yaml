services:
  - type: web
    name: konglomerat
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: EDITOR_PASSWORD
        sync: false
      - key: AUTH_SECRET
        generateValue: true
